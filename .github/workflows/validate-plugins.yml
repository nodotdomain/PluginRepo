name: Validate Plugins

on:
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install ajv ajv-cli

      - name: Validate plugins.json
        run: |
          ajv validate -s docs/manifest-schema.json -d plugins.json --strict=false

      - name: Run plugin linter
        run: |
          node docs/plugin-linter.js
