<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SpectreLens Plugin Browser</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-gray-200 p-10">
  <h1 class="text-4xl font-bold mb-6">SpectreLens Plugin Browser</h1>

  <div id="pluginGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

  <script>
    fetch("https://raw.githubusercontent.com/SpectreLens/PluginRepo/main/plugins.json")
      .then(res => res.json())
      .then(data => {
        const grid = document.getElementById("pluginGrid");

        data.plugins.forEach(p => {
          const card = document.createElement("div");
          card.className = "bg-gray-900 p-5 rounded-lg shadow-lg border border-gray-700";

          card.innerHTML = `
            <img src="${p.iconUrl}" class="w-20 h-20 mb-4 rounded">
            <h2 class="text-xl font-semibold">${p.name}</h2>
            <p class="text-gray-400 text-sm mb-3">${p.description}</p>
            <p class="text-xs text-gray-500 mb-4">Version: ${p.version}</p>
            <a href="${p.downloadUrl}" class="bg-purple-600 px-4 py-2 rounded text-sm">Download</a>
          `;

          grid.appendChild(card);
        });
      });
  </script>
</body>
</html>
